        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

        <title>Calculate Absences</title>
        <!-- PyScript configuration to include necessary packages -->
        <py-config>
        packages = ['numpy', 'matplotlib']
        </py-config>

    <style>
        .card {
            background-color: whitesmoke;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        body {
            background-color: #c9346b;
            font-family: Arial;
            margin-right: auto;
        }

    .navbar-nav .nav-link{
                color: #0a4c86;
                font-weight: bold;
                font-family: "Monstserrat", Arial, sans-serif;
            }
    .navbar-nav .nav-link:hover {
                color: #c9346b;
                font-weight: bolder;
                transition: 0.35s;
            }
            nav {
                background-color: white;
                box-shadow: 5px 0 5px rgba(0,0,0,0.2);
            }
      .sidebar {
        width: 100px;
        background-color: #0a4c86;
        height: 100%;
        position: fixed;
        box-shadow: 5px 0 5px rgba(0,0,0,0.2);
    }
    .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;

    }

    </style>
    </head>

<body>
<!-- This is the navigation bar -->
     <div class="sidebar">

        <nav class="navbar navbar-expand-md fixed-top">
            <div class="container-fluid">
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html" style="font-family: 'Pinyon Script', cursive; font-weight: 400; font-size: 30px;">"Seipsum Facit Persona"</a></li>
                      </ul>

                </div>
            </div>
        </nav>
        <br><br><br><br>
        </div>
    <br><br><br><br>

    <!-- Main Content-->
    <div class="container mt-5">
        <div class="row">
        <div class="col-md-6">
        <div class="card mt-4" style="max-width: 500px;">
            <h1 style="color: #0a502f; font-family: 'arial'; font-weight: bold;">Calculate Absences</h1>
            <!-- This is the form for entering absence data -->
            <label for="Days">Select a Day:</label>
            <select id="Days" name="Days" class="form-select">
                <option value disabled selected>Select a day</option>
                <option value="Mon">Monday</option>
                <option value="Tues">Tuesday</option>
                <option value="Wed">Wednesday</option>
                <option value="Thurs">Thursday</option>
                <option value="Fri">Friday</option>
            </select>
            <br>
            <!-- Input field for entering the number of absences -->
            <label for="absences">Enter Absences:</label>
            <input type="number" name="absences" class="form-control" placeholder="Enter Absences..." id="absences">
            <br>
            <!-- Button to trigger the calculation of absences -->
             <div class="mx-auto d-block">
            <input type="button" py-click="calculate_absences" value="Calculate" class="btn btn-warning" style="width: 250px;">
            </div>
            <br>
            <div id="output"></div>
            <div id="print" class="mt-3 fw-bold" style="color: rgb(212, 155, 255);"></div>
        </div>
        </div>
        <!-- This is the area where the graph will be displayed -->
         <div class="col-md-6">
        <div class="card mt-4" style="width: 685px; background-color: white;">
        <div id="graph-area" style="min-height: 350px; width: 680px;"></div>
            </div>
        </div>
        </div>
        </div>
    
        
    <!-- PyScript code to handle the calculation and graphing -->
    <py-script src="main.py"></py-script>
</body>
</html>
